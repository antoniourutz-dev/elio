
<!DOCTYPE html>
<html lang="eu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#67c7c3" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- iOS PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Elio" />
    <link rel="apple-touch-icon" sizes="180x180" href="/elio-icon-180.png" />

    <title>Elio</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="120x120" href="/elio-icon-120.png" />
    
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
        --sar: env(safe-area-inset-right);
      }
      body {
        font-family: "Avenir Next Rounded", "Trebuchet MS", "Segoe UI", sans-serif;
        background-color: #f4fbfa;
        margin: 0;
        padding: 0;
        height: 100dvh;
        width: 100vw;
        overflow: hidden;
        line-height: 1.4;
        -webkit-tap-highlight-color: transparent;
      }
      button,
      a,
      input,
      textarea,
      select {
        touch-action: manipulation;
      }
      button:focus-visible,
      a:focus-visible,
      input:focus-visible {
        outline: 3px solid #67c7c3;
        outline-offset: 2px;
      }
      .safe-pt { padding-top: var(--sat); }
      .safe-pb { padding-bottom: var(--sab); }
      .safe-px { padding-left: var(--sal); padding-right: var(--sar); }
      
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
      }
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 24px;
        width: 24px;
        border-radius: 50%;
        background: #67c7c3;
        cursor: pointer;
        border: 4px solid white;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      }
    </style>
    <script>
      const isLocalhost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      if ('serviceWorker' in navigator && !isLocalhost) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .catch(() => undefined);
        });
      }
    </script>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
